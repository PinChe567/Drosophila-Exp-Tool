<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 3D 模型</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column; /* 改為垂直排列以便放按鈕 */
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        
        model-viewer {
            width: 100%;
            height: 500px;
            max-width: 800px;
        }

        /* 按鈕的美化樣式 */
        .color-buttons {
            margin-top: 20px;
        }
        button {
            padding: 8px 16px;
            margin: 0 5px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            color: white;
            transition: 0.2s;
        }
        button:hover { opacity: 0.8; }
        .btn-red { background-color: #e74c3c; }
        .btn-green { background-color: #2ecc71; }
        .btn-blue { background-color: #3498db; }
        .btn-default { background-color: #7f8c8d; }
    </style>
</head>
<body>

    <model-viewer 
        id="myModel"
        src="Big Transmittion.glb" 
        alt="我的 3D 模型" 
        auto-rotate 
        camera-controls
        min-camera-orbit="auto 0deg auto"
        max-camera-orbit="auto 180deg auto">
    </model-viewer>

    <div class="color-buttons">
        <button class="btn-red" onclick="changeColor(1, 0.2, 0.2)">紅色</button>
        <button class="btn-green" onclick="changeColor(0.2, 1, 0.2)">綠色</button>
        <button class="btn-blue" onclick="changeColor(0.2, 0.5, 1)">藍色</button>
        <button class="btn-default" onclick="changeColor(0.8, 0.8, 0.8)">恢復原色</button>
    </div>

    <script>
        const modelViewer = document.getElementById('myModel');

        function changeColor(r, g, b) {
            // 確保模型已經成功載入
            if (modelViewer.model && modelViewer.model.materials[0]) {
                const material = modelViewer.model.materials[0];
                // 設定新顏色 [R, G, B, Alpha透明度] 
                material.pbrMetallicRoughness.setBaseColorFactor([r, g, b, 1]);
            } else {
                alert('模型還在載入中，請等一下再按喔！');
            }
        }
    </script>

</body>
</html>
